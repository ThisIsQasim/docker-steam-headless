name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Check out repository
      - name: Check out repository
        uses: actions/checkout@v4

      # Install and verify Docker
      - name: Install and verify Docker
        run: |
          # Verify Docker is installed
          if ! command -v docker &> /dev/null; then
            echo "Docker not found, installing..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sh get-docker.sh
            rm get-docker.sh
          fi
          echo "Docker version:"
          docker --version
          
      # Configure firewall for Docker daemon
      - name: Configure firewall for Docker
        run: |
          # Allow Docker daemon access
          # Ensure Docker can communicate properly for Copilot agent operations
          sudo ufw allow 2375/tcp || echo "UFW rule for 2375/tcp already exists or UFW not active"
          sudo ufw allow 2376/tcp || echo "UFW rule for 2376/tcp already exists or UFW not active"
          echo "✓ Firewall configuration completed"

      # Verify Docker is working
      - name: Verify Docker installation
        run: |
          docker info
          echo "✓ Docker is properly installed and configured for Copilot agent"
